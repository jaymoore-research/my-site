<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoboTerri - Bioinformatics AI Assistant</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d10; --surface: #13161b; --border: #1e2228;
    --text: #e2e4e9; --muted: #6b7280; --accent: #3b82f6;
    --accent-hover: #2563eb; --user-bg: #1e3a5f; --user-text: #c8ddf5;
    --bot-bg: #181b21; --bot-border: #252830;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-text h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .header-text .sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ef4444; margin-left: auto; flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.connected { background: #22c55e; }
  .powered-by {
    font-size: 11px; color: var(--muted); margin-left: 8px;
    text-decoration: none; opacity: 0.7; transition: opacity 0.2s;
  }
  .powered-by:hover { opacity: 1; }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    max-width: 85%; padding: 10px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.55; white-space: pre-wrap;
    word-wrap: break-word; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end; background: var(--user-bg);
    color: var(--user-text); border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start; background: var(--bot-bg);
    border: 1px solid var(--bot-border); border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center; background: none; color: var(--muted);
    font-size: 12px; padding: 6px 0; max-width: 100%;
  }
  .msg.error { color: #f87171; }
  .typing {
    align-self: flex-start; color: var(--muted); font-size: 13px;
    padding: 6px 14px; animation: fadeIn 0.2s ease;
  }
  .typing::after {
    content: ''; display: inline-block;
    animation: dots 1.4s steps(4) infinite;
  }
  @keyframes dots {
    0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
  }

  /* Welcome */
  .welcome {
    text-align: center; padding: 40px 20px; max-width: 480px;
    margin: auto; animation: fadeIn 0.4s ease;
  }
  .welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .welcome p { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .suggestions button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 20px;
    font-size: 13px; cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .suggestions button:hover {
    border-color: var(--accent); color: var(--accent);
  }

  /* Input */
  .input-area {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 16px; display: flex; gap: 8px; flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); padding: 10px 14px;
    font-size: 14px; font-family: inherit; resize: none; outline: none;
    min-height: 42px; max-height: 140px; transition: border-color 0.15s;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: #4b5563; }
  .input-area button {
    background: var(--accent); border: none; color: #fff;
    width: 42px; height: 42px; border-radius: 12px;
    font-size: 18px; cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; align-self: flex-end;
  }
  .input-area button:hover { background: var(--accent-hover); }
  .input-area button:disabled { opacity: 0.3; cursor: default; }
  .input-area button svg { width: 20px; height: 20px; }

  /* Footer */
  .footer {
    text-align: center; padding: 8px 16px; font-size: 11px;
    color: #374151; background: var(--bg); flex-shrink: 0;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .msg { max-width: 92%; }
    .header { padding: 12px 14px; }
    .messages { padding: 14px 10px; }
    .powered-by { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🧬</div>
  <div class="header-text">
    <h1>RoboTerri</h1>
    <div class="sub">Bioinformatics AI Assistant</div>
  </div>
  <a class="powered-by" href="https://github.com/jaymoore-research/ClawBio" target="_blank">by ClawBio</a>
  <div class="status-dot" id="status" title="Disconnected"></div>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <h2>Ask RoboTerri anything</h2>
    <p>Pharmacogenomics, ancestry, nutrigenomics, variant lookup, polygenic risk scores, and more.</p>
    <div class="suggestions">
      <button onclick="useSuggestion(this)">What drugs interact with CYP2D6?</button>
      <button onclick="useSuggestion(this)">Run a pharmgx demo</button>
      <button onclick="useSuggestion(this)">Look up rs3798220</button>
      <button onclick="useSuggestion(this)">What skills do you have?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="Ask a bioinformatics question..." rows="1"></textarea>
  <button id="send" onclick="sendMessage()" title="Send">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<div class="footer">
  ClawBio is a research tool, not a medical device. Consult a healthcare professional before making medical decisions.
</div>

<script>
const GATEWAY_URL = 'wss://macbook-pro-7.tail8eccc9.ts.net';
const AUTH_PASSWORD = new URLSearchParams(window.location.search).get('p') || '';

let ws = null;
let sessionId = null;
let reconnectTimer = null;
let hasMessages = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const welcomeEl = document.getElementById('welcome');

function connect() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket(GATEWAY_URL);

  ws.onopen = () => {
    statusEl.classList.add('connected');
    statusEl.title = 'Connected';
    const auth = {};
    if (AUTH_PASSWORD) auth.password = AUTH_PASSWORD;
    ws.send(JSON.stringify({
      type: 'connect',
      params: { auth, clientName: 'roboterri-webchat' }
    }));
  };

  ws.onmessage = (event) => {
    try {
      handleMessage(JSON.parse(event.data));
    } catch (e) {
      console.error('Parse error:', e);
    }
  };

  ws.onclose = () => {
    statusEl.classList.remove('connected');
    statusEl.title = 'Disconnected';
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    statusEl.classList.remove('connected');
    statusEl.title = 'Connection error';
  };
}

function handleMessage(data) {
  if (data.type === 'connected') {
    sessionId = data.sessionId;
    return;
  }

  if (data.type === 'chat' || data.type === 'chat.stream') {
    const text = data.text || data.content || '';
    if (text && data.role === 'assistant') {
      removeTyping();
      addMessage(text, 'assistant');
    }
    return;
  }

  if (data.type === 'chat.typing') {
    if (!document.querySelector('.typing')) {
      const el = document.createElement('div');
      el.className = 'typing';
      el.textContent = 'RoboTerri is thinking';
      messagesEl.appendChild(el);
      scrollToBottom();
    }
    return;
  }

  if (data.type === 'error') {
    removeTyping();
    addMessage('Connection error. Please try again.', 'system error');
    return;
  }
}

function removeTyping() {
  const t = document.querySelector('.typing');
  if (t) t.remove();
}

function addMessage(text, className) {
  if (!hasMessages) {
    welcomeEl.style.display = 'none';
    hasMessages = true;
  }
  const el = document.createElement('div');
  el.className = `msg ${className}`;
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollToBottom();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;

  addMessage(text, 'user');
  ws.send(JSON.stringify({
    type: 'chat.send',
    text: text,
    sessionId: sessionId,
  }));
  inputEl.value = '';
  inputEl.style.height = 'auto';
}

function useSuggestion(btn) {
  inputEl.value = btn.textContent;
  sendMessage();
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

// Enter to send, Shift+Enter for newline
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

connect();
</script>
</body>
</html>
